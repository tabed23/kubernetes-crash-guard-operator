# Apply to any namespace to enable monitoring.
# kubectl apply -f this-file.yaml
# kubectl get clp --all-namespaces
# kubectl delete clp policy -n <namespace>   <- disables monitoring

# critical — fast rollback
apiVersion: crashguard.io/v1alpha1
kind: CrashLoopPolicy
metadata:
  name: policy
  namespace: payment-gateway
spec:
  thresholdMinutes: 5
  autoRollback: true
  minRevisionsForRollback: 3
---
