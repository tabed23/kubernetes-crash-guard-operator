apiVersion: v1
kind: Namespace
metadata:
  name: crashguard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crashguard
  namespace: crashguard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crashguard
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["crashguard.io"]
    resources: ["crashlooppolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crashguard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crashguard
subjects:
  - kind: ServiceAccount
    name: crashguard
    namespace: crashguard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashguard
  namespace: crashguard
spec:
  replicas: 1
  selector:
    matchLabels: { app: crashguard }
  template:
    metadata:
      labels: { app: crashguard }
    spec:
      serviceAccountName: crashguard
      imagePullSecrets:
        - name: vag
      containers:
        - name: operator
          image: crashguard:latest
          env:
            - name: CRASH_THRESHOLD_MINUTES
              value: "10"
            - name: AUTO_ROLLBACK
              value: "true"
            - name: MIN_REVISIONS_FOR_ROLLBACK
              value: "3"
            - name: LOG_TAIL_LINES
              value: "15"
            - name: STARTUP_GRACE_SECONDS
              value: "120"
            - name: ALERT_COOLDOWN_SECONDS
              value: "900"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: crashguard-secrets
                  key: SLACK_WEBHOOK_URL
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
